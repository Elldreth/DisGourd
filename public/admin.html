<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DisGourd Admin</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="container">
        <h1>DisGourd Server Administration</h1>

        <section id="server-status">
            <h2>Server Status</h2>
            <div id="status-content">
                <p>Loading status...</p>
            </div>
        </section>

        <section id="manage-spaces">
            <h2>Manage Spaces</h2>
            <div class="form-container">
                <h3>Create New Space</h3>
                <form id="create-space-form">
                    <input type="text" id="new-space-name" placeholder="Space Name" required>
                    <button type="submit">Create Space</button>
                </form>
            </div>
            <div id="spaces-list">
                <!-- Spaces will be listed here -->
            </div>
        </section>

        <section id="manage-channels">
            <h2>Manage Channels</h2>
            <div class="form-container">
                <h3>Create New Channel</h3>
                <form id="create-channel-form">
                    <select id="select-space-for-channel" required>
                        <option value="">-- Select Space --</option>
                    </select>
                    <input type="text" id="new-channel-name" placeholder="Channel Name" required>
                    <button type="submit">Create Channel</button>
                </form>
            </div>
            <div id="channels-list">
                <!-- Channels for selected space will be listed here -->
            </div>
        </section>
    </div>

    <script src="admin.js"></script>
</body>
</html>
